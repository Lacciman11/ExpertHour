<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Reset Password | ExpertHour</title>

    <link
        rel="stylesheet"
        href="/css/auth.css">

</head>

<body>

<div class="auth-card">

    <div class="logo">

        <h1>ExpertHour</h1>

        <p>Learn • Connect • Grow</p>

    </div>

    <div class="title">

        <h2>Reset Password</h2>

        <p>

            Enter your new password below.

        </p>

    </div>

    <form id="resetForm">

        <div class="form-group">

            <label>

                New Password

            </label>

            <input

                type="password"

                id="password"

                placeholder="Enter new password"

                required

            >

        </div>

        <div class="form-group">

            <label>

                Confirm Password

            </label>

            <input

                type="password"

                id="confirmPassword"

                placeholder="Confirm password"

                required

            >

        </div>

        <button>

            Reset Password

        </button>

    </form>

    <div
        class="message"
        id="message">

    </div>

</div>

<script src="/js/reset-password.js"></script>

</body>

</html>
